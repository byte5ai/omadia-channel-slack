schema_version: "1"

# ===========================================================================
# @omadia/channel-slack — Slack channel (Events API webhook | Socket Mode)
# ---------------------------------------------------------------------------
# Schema of truth: docs/harness-platform/manifest-schema.v1.yaml (section 14).
# A channel ROUTES turns — it has NO capabilities / playbook of its own. It
# receives native Slack events, translates them to the core IncomingTurn
# shape, drives the orchestrator's ChatAgent, and renders the answer back to
# Slack. Dual transport, selected by config:
#   • public_base_url SET   → Events API webhook (Slack-recommended for prod,
#                             Marketplace-eligible). Signed POSTs to
#                             <public_base_url>/api/slack/events.
#   • public_base_url EMPTY → Socket Mode WebSocket (no public host; local dev
#                             / behind-firewall). Same as the WhatsApp socket.
# This mirrors the Telegram channel's webhook + long-poll-fallback shape.
# ===========================================================================

identity:
  id: "@omadia/channel-slack"             # === package.json "name"
  kind: "channel"
  domain: "slack"
  name: "Slack"
  version: "0.2.1"                         # === package.json "version"
  description: "Slack-Channel via Events API (Webhook, prod-empfohlen) oder Socket Mode (Fallback ohne Public-Host). Routet Slack-DMs und @Mentions in den Omadia-Orchestrator."
  authors:
    - name: "byte5 GmbH"
      email: "info@omadia.ai"
      url: "https://omadia.ai"
  license: "MIT"
  homepage: "https://github.com/byte5ai/omadia-channel-slack"
  icon: "./assets/icon.svg"
  categories:
    - "communication"

compat:
  core: ">=1.0 <2.0"
  node: ">=20"

depends_on: []

lifecycle:
  entry: "dist/plugin.js"                  # exports `activate(ctx, core)` (ChannelPlugin shape 1)
  uninstall_policy:
    entities: "delete"
    memory: "delete"
    secrets: "delete"                      # drops the stored bot- + app-token

# ---------------------------------------------------------------------------
# Setup. The Slack tokens/secrets are SECRETS — collected by the core UI and
# stored in the per-plugin vault; the plugin reads them at runtime via
# ctx.secrets.get(...). Transport is chosen at activation from public_base_url:
#   • set   → Events API webhook → needs bot_token + signing_secret.
#   • empty → Socket Mode        → needs bot_token + app_token.
# app_token / signing_secret are therefore mode-conditional — both are
# required:false here and validated at runtime with a clear error. self_test
# stays false: validating a token needs a live Slack round-trip, which the
# post-submit onConfigure smoke probe does not perform for a channel. The
# connection status (incl. a bad-token error) is surfaced in the admin UI.
# ---------------------------------------------------------------------------
setup:
  guide:
    en: |
      ## Create a Slack app

      You create a Slack app, grant bot scopes and choose **one** of two
      transport modes. Takes about 10 minutes.

      ### 1. Create the app
      1. Open [api.slack.com/apps](https://api.slack.com/apps) → **Create New App** → **From scratch**.
      2. Pick a name + workspace → **Create App**.

      ### 2. Set bot scopes
      Left sidebar → **OAuth & Permissions** → **Scopes** → **Bot Token Scopes** → add these:
      `app_mentions:read`, `chat:write`, `reactions:write`, `im:history`,
      `channels:history`, `groups:history`, `mpim:history`, `users:read`.

      ### 3. Install & get the bot token
      1. At the top, click **Install to Workspace** → **Allow**.
      2. Copy the **Bot User OAuth Token** (starts with `xoxb-`) → paste below as **Bot User OAuth Token**.

      ### 4. Choose a transport

      **Option A — Events API (for production, public HTTPS host)**
      1. **Basic Information** → **App Credentials** → copy the **Signing Secret** → field **Signing Secret**.
      2. Set the **Public HTTPS Base-URL** field (e.g. `https://bot.example.com`).
      3. Left sidebar → **Event Subscriptions** → **Enable** → **Request URL**:
         `<your-base-url>/api/slack/events` (must be reachable, Slack verifies immediately).
      4. **Subscribe to bot events**: `app_mention`, `message.im`, `message.channels`,
         `message.groups`, `message.mpim` → **Save Changes**.

      **Option B — Socket Mode (local / behind a firewall, no public host)**
      1. Leave **Public HTTPS Base-URL** *empty*.
      2. **Basic Information** → **App-Level Tokens** → **Generate Token** with scope
         `connections:write` → copy → field **App-Level Token** (`xapp-…`).
      3. Left sidebar → **Socket Mode** → **Enable**.
      4. **Event Subscriptions** → subscribe to the same bot events as above (no Request URL needed).

      ### 5. Invite the bot to channels
      Run `/invite @YourBot` in each channel you want. DMs work without an
      invite (if *Allow direct messages* is on).
    de: |
      ## Slack-App anlegen

      Du legst eine Slack-App an, vergibst Bot-Scopes und wählst **einen** von zwei
      Transport-Modi. Dauer ca. 10 Minuten.

      ### 1. App erstellen
      1. Öffne [api.slack.com/apps](https://api.slack.com/apps) → **Create New App** → **From scratch**.
      2. Namen + Workspace wählen → **Create App**.

      ### 2. Bot-Scopes setzen
      Linke Leiste → **OAuth & Permissions** → **Scopes** → **Bot Token Scopes** → diese hinzufügen:
      `app_mentions:read`, `chat:write`, `reactions:write`, `im:history`,
      `channels:history`, `groups:history`, `mpim:history`, `users:read`.

      ### 3. Installieren & Bot-Token holen
      1. Oben auf **Install to Workspace** → **Allow**.
      2. Kopiere den **Bot User OAuth Token** (beginnt mit `xoxb-`) → unten als **Bot User OAuth Token** eintragen.

      ### 4. Transport wählen

      **Variante A — Events API (für Produktion, öffentlicher HTTPS-Host)**
      1. **Basic Information** → **App Credentials** → **Signing Secret** kopieren → Feld **Signing Secret**.
      2. Feld **Public HTTPS Base-URL** setzen (z.B. `https://bot.example.com`).
      3. Linke Leiste → **Event Subscriptions** → **Enable** → **Request URL**:
         `<deine-base-url>/api/slack/events` (muss erreichbar sein, Slack verifiziert sofort).
      4. **Subscribe to bot events**: `app_mention`, `message.im`, `message.channels`,
         `message.groups`, `message.mpim` → **Save Changes**.

      **Variante B — Socket Mode (lokal / hinter Firewall, kein Public-Host)**
      1. **Public HTTPS Base-URL** *leer lassen*.
      2. **Basic Information** → **App-Level Tokens** → **Generate Token** mit Scope
         `connections:write` → kopieren → Feld **App-Level Token** (`xapp-…`).
      3. Linke Leiste → **Socket Mode** → **Enable**.
      4. **Event Subscriptions** → dieselben Bot-Events wie oben abonnieren (keine Request URL nötig).

      ### 5. Bot in Channels einladen
      In jedem gewünschten Channel `/invite @DeinBot` ausführen. DMs funktionieren
      ohne Einladung (falls *Direktnachrichten zulassen* aktiv).
  fields:
    - key: "bot_token"
      type: "secret"
      label: "Bot User OAuth Token (xoxb-…)"
      help: "OAuth & Permissions → Bot User OAuth Token. Benötigte Bot-Scopes: app_mentions:read, chat:write, reactions:write, im:history, channels:history, groups:history, mpim:history, users:read."
      required: true

    - key: "public_base_url"
      type: "url"
      label: "Public HTTPS Base-URL (Events API)"
      help: "Öffentliche HTTPS-Origin, unter der die Middleware erreichbar ist (z.B. https://bot.example.com). GESETZT → Events-API-Modus: trage `<base>/api/slack/events` in deiner Slack-App unter Event Subscriptions als Request URL ein. LEER → Socket-Mode-Fallback (kein Public-Host, gut für lokale Dev)."
      required: false

    - key: "signing_secret"
      type: "secret"
      label: "Signing Secret (Events API)"
      help: "Basic Information → App Credentials → Signing Secret. Verifiziert eingehende Slack-Requests (HMAC). Nur im Events-API-Modus nötig (wenn public_base_url gesetzt ist)."
      required: false

    - key: "app_token"
      type: "secret"
      label: "App-Level Token (xapp-…, nur Socket Mode)"
      help: "Basic Information → App-Level Tokens. Token mit Scope `connections:write` + Socket Mode aktivieren. Öffnet die WebSocket-Verbindung. Nur nötig, wenn public_base_url LEER ist (Socket-Mode-Fallback)."
      required: false

    - key: "respond_in_channels"
      type: "enum"
      label: "Verhalten in Channels"
      help: "Wann antwortet der Bot in Channels/Gruppen? `mention` (empfohlen): nur wenn der Bot direkt mit @ erwähnt wird. `all`: auf jede Nachricht in Channels, in denen der Bot Mitglied ist (laut)."
      required: false
      default: "mention"
      enum:
        - { value: "mention", label: "Nur bei @Mention" }
        - { value: "all", label: "Auf jede Nachricht" }

    - key: "allow_dms"
      type: "boolean"
      label: "Direktnachrichten zulassen"
      help: "Wenn aktiv, antwortet der Bot auf 1:1-DMs. Andernfalls bleiben DMs still."
      required: false
      default: true

    - key: "allowlist"
      type: "string"
      label: "Allowlist (optional)"
      help: "Komma-getrennte Slack-Channel-IDs (C…) und/oder User-IDs (U…), die mit dem Bot interagieren dürfen. Leer = alle erlaubten Konversationen."
      required: false
      default: ""

  self_test: false

# ---------------------------------------------------------------------------
# Permissions. Slack tokens live in the vault (ctx.secrets), so no ctx.memory
# auth-state persistence is needed. network.outbound is declared for the
# operator permissions summary — the Slack WebClient + Socket Mode client open
# their own connections (they do not route through ctx.http), so this list is
# descriptive, not enforced for this plugin.
# ---------------------------------------------------------------------------
permissions:
  memory:
    reads: []
    writes: []
  graph:
    reads: []
    writes: []
  network:
    outbound:
      - "slack.com"
      - "*.slack.com"
  filesystem:
    scratch: false

# Generic admin-UI iframe surface (rendered by web-ui for any plugin that
# declares admin_ui_path). This is where the operator sees connection status,
# the linked workspace, and can trigger a reconnect.
admin_ui_path: "/api/slack-channel/admin/index.html"

# ---------------------------------------------------------------------------
# Channel block (schema section 14). Declares the PRIMARY (recommended)
# transport: the Events API webhook. The plugin self-mounts the route via
# ctx.routes.register and verifies the X-Slack-Signature itself
# (verify_signature: true). When public_base_url is empty the plugin instead
# opens a Socket Mode WebSocket at runtime (no route) — the manifest block
# stays descriptive; the kernel does not auto-wire either path.
# ---------------------------------------------------------------------------
channel:
  transport:
    kind: "webhook"
    routes:
      - path: "/api/slack/events"
        method: "POST"
    verify_signature: true
  capabilities:
    - "text"
  adapters:
    - "text"
    - "markdown"
